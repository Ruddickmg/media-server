version: 2.1

executors:
  nix:
    docker:
      - image: nixos/nix:latest
    environment:
      NIX_CONFIG: experimental-features = nix-command flakes

jobs:
  lint:
    executor: nix
    steps:
      - checkout
      - run:
          name: check formatting on all *.nix files
          command: |
            nix run nixpkgs#nixfmt -- --check \
              $(find . -name '*.nix' -not -path './.git/*' | sort)

  build:
    executor: nix
    steps:
      - checkout
      - run:
          name: Generate hardware configuration for CI
          command: |
            printf '%s\n' \
              '{ ... }: {' \
              '}' \
              > hosts/media-server/hardware-configuration.nix
            git add -f hosts/media-server/hardware-configuration.nix
      - run:
          name: Generate dummy VPN config for CI
          command: |
            mkdir -p /etc/nixos/secrets
            printf '%s\n' \
              '[Interface]' \
              'Address = 10.2.0.2/32' \
              'PrivateKey = dummydummydummydummydummydummydummydummydummydummyd=' \
              'DNS = 10.2.0.1' \
              '' \
              '[Peer]' \
              'PublicKey = dummydummydummydummydummydummydummydummydummydummyd=' \
              'Endpoint = 10.2.0.1:51820' \
              > /etc/nixos/secrets/vpn.conf
      - run:
          name: Build
          command: nix build --impure .#nixosConfigurations.media-server.config.system.build.toplevel

workflows:
  version: 2
  ci:
    jobs:
      - lint
      - build
